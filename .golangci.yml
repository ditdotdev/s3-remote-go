# golangci-lint configuration for s3-remote-go
# Configuration for golangci-lint v2.5.0+
version: 2

run:
  timeout: 5m
  modules-download-mode: readonly
  go: '1.24'

output:
  print-issued-lines: true
  print-linter-name: true
  format: colored-line-number

linters:
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gosec
    - misspell
    - revive
    - gocyclo
    - goconst
    - whitespace
    - wsl_v5
    - predeclared
    - nolintlint
    - copyloopvar
    - gocritic

linters-settings:
  errcheck:
    check-type-assertions: true
  gocyclo:
    min-complexity: 15
  goconst:
    min-len: 2
    min-occurrences: 2
  gosec:
    excludes:
      - G404 # Use of weak random number generator
  revive:
    rules:
      - name: exported
        arguments:
          - "checkPrivateReceivers"
          - "sayRepetitiveInsteadOfStutters"

issues:
  exclude-use-default: false
  exclude-rules:
    # Exclude some linters from running on tests files
    - path: _test\.go
      linters:
        - gocyclo
        - errcheck
        - gosec
        - goconst
  max-issues-per-linter: 0
  max-same-issues: 0