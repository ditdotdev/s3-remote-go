# golangci-lint configuration for s3-remote-go
# Configuration compatible with golangci-lint v2.5.0
version: "2"

run:
  timeout: 5m
  modules-download-mode: readonly

linters:
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gosec
    - misspell
    - gocyclo
    - goconst
    - whitespace