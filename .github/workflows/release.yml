#
# When a tag is pushed, build and upload the binary to the in-progress draft release.
#
name: Release

on: create

permissions:
  contents: write

jobs:
  upload:
    name: Build and Upload
    strategy:
      matrix:
        os: [ ubuntu-latest ]
    runs-on: ${{ matrix.os }}
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25.1'
      - name: Configure Git for private modules
        run: git config --global url."https://${{ secrets.GO_MODULES_TOKEN }}@github.com/".insteadOf "https://github.com/"
        env:
          GO_MODULES_TOKEN: ${{ secrets.GO_MODULES_TOKEN }}
      - name: Get Draft Release
        id: draft_release
        run: |
          echo "upload_url=$(curl -sH "Authorization: token $GITHUB_TOKEN" https://api.github.com/repos/$GITHUB_REPOSITORY/releases | jq -rc '.[] | select(.draft) | .upload_url')" >> $GITHUB_OUTPUT
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Get Binary Name
        id: binary_name
        run: ./.github/get-binary-name s3 ${{ runner.os }}
      - name: Build
        run: go build -o build/s3 ./cmd/s3
        env:
          GOPRIVATE: github.com/datadatdat/*
      - name: Test
        run: go test ./...
        env:
          GOPRIVATE: github.com/datadatdat/*
      - name: Upload Artifact
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.draft_release.outputs.upload_url }}
          asset_path: ./build/s3
          asset_name: ${{ steps.binary_name.outputs.binary_name }}
          asset_content_type: application/octet-stream
