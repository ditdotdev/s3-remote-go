#

#
# When a tag is pushed, build, test, and publish a release immediately.
#
name: Release

on: create

permissions:
  contents: write
  pull-requests: write

jobs:
  upload:
    name: Build and Upload
    strategy:
      matrix:
        os: [ ubuntu-latest ]
    runs-on: ${{ matrix.os }}
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v7
        with:
          go-version: '1.26.2'
      - name: Configure Git for private modules
        run: git config --global url."https://${{ secrets.GO_MODULES_TOKEN }}@github.com/".insteadOf "https://github.com/"
        env:
          GO_MODULES_TOKEN: ${{ secrets.GO_MODULES_TOKEN }}
      - name: Get or Create Draft Release
        id: draft_release
        run: |
          TAG_NAME=${GITHUB_REF#refs/tags/}
          echo "Looking for published release with tag: $TAG_NAME"

          # Try to find existing draft release for this tag
          UPLOAD_URL=$(curl -sH "Authorization: token $GITHUB_TOKEN" \
            "https://api.github.com/repos/$GITHUB_REPOSITORY/releases" | \
            jq -rc --arg tag "$TAG_NAME" '.[] | select(.draft and .tag_name == $tag) | .upload_url')

          if [ "$UPLOAD_URL" != "null" ] && [ -n "$UPLOAD_URL" ]; then
            echo "Found existing published release"
            echo "upload_url=$UPLOAD_URL" >> $GITHUB_OUTPUT
          else
            echo "No published release found for tag $TAG_NAME, creating one..."
            RESPONSE=$(curl -sH "Authorization: token $GITHUB_TOKEN" \
              -X POST "https://api.github.com/repos/$GITHUB_REPOSITORY/releases" \
              -d "{\"tag_name\":\"$TAG_NAME\",\"name\":\"$TAG_NAME\",\"body\":\"Release $TAG_NAME\",\"draft\":false}")

            UPLOAD_URL=$(echo "$RESPONSE" | jq -rc '.upload_url')
            echo "Created published release with upload_url: $UPLOAD_URL"
            echo "upload_url=$UPLOAD_URL" >> $GITHUB_OUTPUT
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Get Binary Name
        id: binary_name
        run: ./.github/get-binary-name s3 ${{ runner.os }}
      - name: Build
        run: go build -o build/s3 ./cmd/s3
        env:
          GOPRIVATE: github.com/ditdotdev/*
      - name: Test
        run: go test ./...
        env:
          GOPRIVATE: github.com/ditdotdev/*
      - name: Upload Artifact
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG_NAME=${GITHUB_REF#refs/tags/}
          BINARY_NAME="${{ steps.binary_name.outputs.binary_name }}"
          # gh names the asset after the file, so stage the binary under the
          # published asset name (e.g. s3-linux) that consumers download.
          cp ./build/s3 "./build/${BINARY_NAME}"
          # --clobber overwrites a stale/partial asset instead of 422-ing, the
          # failure mode that made actions/upload-release-asset@v1 brittle on reruns.
          gh release upload "$TAG_NAME" "./build/${BINARY_NAME}" --clobber
